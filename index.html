<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Pedrova jízda</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Rychlá neonová runner hra optimalizovaná pro iPhone.">
    <meta name="theme-color" content="#070812">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Pedrova jízda">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="game-canvas" aria-label="Pedrova jízda"></canvas>
    <div id="flash"></div>

    <section id="main-menu" class="screen active">
        <div class="brand-card">
            <div class="eyebrow">NEON RUNNER</div>
            <h1>Pedrova<br>jízda</h1>
            <p>Profesionální mobilní runner. Tři pruhy, rychlost, combo, štíty a čistý iPhone výkon.</p>
            <button id="play-btn" class="primary-btn">Start jízdy</button>
            <div class="hint-row">
                <span>Swipe = pruh</span>
                <span>Tap = skok</span>
                <span>Dolů = boost</span>
            </div>
        </div>
    </section>

    <section id="game-screen" class="screen game-layer">
        <header class="hud">
            <div class="hud-block">
                <span class="hud-label">Skóre</span>
                <strong id="current-score">0</strong>
            </div>
            <div class="hud-center">
                <div id="combo-display" class="combo">x1</div>
                <div id="near-miss-popup" class="near-miss">Near miss</div>
            </div>
            <div class="hud-block right">
                <span class="hud-label">Životy</span>
                <div id="lives-container" class="lives"></div>
            </div>
            <button id="pause-btn" class="pause-btn" aria-label="Pauza">Ⅱ</button>
        </header>

        <div class="boost-track"><div id="dash-cooldown-bar" class="boost-bar ready"></div></div>

        <nav class="controls" aria-label="Ovládání">
            <button id="ctrl-left" class="ctrl-btn">◀</button>
            <button id="ctrl-jump" class="ctrl-btn main">▲<small>SKOK</small></button>
            <button id="ctrl-dash" class="ctrl-btn main boost">⚡<small>BOOST</small></button>
            <button id="ctrl-right" class="ctrl-btn">▶</button>
        </nav>
    </section>

    <section id="game-over" class="screen">
        <div class="brand-card compact">
            <div class="eyebrow danger">RUN COMPLETE</div>
            <h2>Jízda<br>skončila</h2>
            <div class="final-score" id="final-score">0</div>
            <div class="stats-grid">
                <div><span>Best</span><strong id="best-score">0</strong></div>
                <div><span>Čas</span><strong id="game-time">0s</strong></div>
                <div><span>Skoky</span><strong id="stat-jumps">0</strong></div>
                <div><span>Boost</span><strong id="stat-dashes">0</strong></div>
                <div><span>Near miss</span><strong id="stat-nearMisses">0</strong></div>
                <div><span>Combo</span><strong id="stat-maxCombo">x1</strong></div>
            </div>
            <button id="restart-btn" class="primary-btn">Nová jízda</button>
            <button id="menu-btn" class="ghost-btn">Menu</button>
        </div>
    </section>

    <script src="main.js" defer></script>
</body>
</html>
